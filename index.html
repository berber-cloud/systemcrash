    function progressBar(percent) {
        const len = 40;
        const filled = Math.floor((percent / 100) * len);
        const empty = len - filled;
        const bar = '█'.repeat(filled) + '░'.repeat(empty);
        const line = document.createElement('div');
        line.className = 'line';
        line.innerHTML = `<span class="progress-line">[${bar}] ${percent}%</span>`;
        output.appendChild(line);
        output.scrollTop = output.scrollHeight;
        return line;
    }

    function updateProgress(lineElem, percent) {
        const len = 40;
        const filled = Math.floor((percent / 100) * len);
        const empty = len - filled;
        const bar = '█'.repeat(filled) + '░'.repeat(empty);
        lineElem.innerHTML = `<span class="progress-line">[${bar}] ${percent}%</span>`;

            await delay(50);
        }


<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>terminal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.4;
            padding: 8px;
            height: 100vh;
            overflow: hidden;
        }
        #terminal {
            height: 100%;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .line {
            display: block;
            margin: 0;
            padding: 0;
        }
        .prompt {
            color: #0f0;
        }
        ::-webkit-scrollbar {
            width: 8px;
            background: #111;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
        }
    </style>
</head>
<body>
<div id="terminal"></div>

<script>
    const term = document.getElementById('terminal');

    function println(text, isPrompt = false, promptText = 'user@localhost:~$ ') {
        const line = document.createElement('div');
        line.className = 'line';
        if (isPrompt) {
            line.innerHTML = `<span class="prompt">${promptText}</span>${text}`;
        } else {
            line.innerText = text;
        }
        term.appendChild(line);
        term.scrollTop = term.scrollHeight;
    }

    function progressBar(percent) {
        const width = 40;
        const filled = Math.floor(percent / 100 * width);
        const empty = width - filled;
        const bar = '█'.repeat(filled) + '░'.repeat(empty);
        println(`[${bar}] ${percent}%`);
    }

    async function delay(ms) {
        return new Promise(r => setTimeout(r, ms));
    }

    async function task(name, durationVariation = 1) {
        println(`> ${name}`);
        const start = Date.now();
        let lastPercent = -1;
        let duration = 2500 + Math.random() * 1000;
        if (durationVariation === 2) duration = 1800;
        if (durationVariation === 3) duration = 3200;
        
        const line = document.createElement('div');
        line.className = 'line';
        term.appendChild(line);
        
        while (true) {
            const elapsed = Date.now() - start;
            let percent = Math.min(100, Math.floor(elapsed / duration * 100));
            
            // неравномерность
            if (elapsed < 600) percent = Math.floor(percent * 0.6);
            else if (elapsed < 1400) percent = 30 + Math.floor((percent - 30) * 1.3);
            
            percent = Math.min(100, Math.max(0, percent));
            if (percent !== lastPercent) {
                const filled = Math.floor(percent / 100 * 40);
                const empty = 40 - filled;
                const bar = '█'.repeat(filled) + '░'.repeat(empty);
                line.innerText = `[${bar}] ${percent}%`;
                lastPercent = percent;
                term.scrollTop = term.scrollHeight;
            }
            if (elapsed >= duration) {
                line.innerText = `[${'█'.repeat(40)}] 100%`;
                break;
            }
            await delay(50);
        }
        println(`[ok] ${name}`);
    }

    async function main() {
        println('', true);
        println('initializing forensic extraction module v2.7', false);
        await delay(300);
        println('target: SM-G998B / android 13', false);
        await delay(200);
        println('device fingerprint: 9A:2B:3C:4D:5E:6F', false);
        await delay(250);
        println('bypassing secure boot...', false);
        await delay(400);
        println('root access: granted', false);
        await delay(200);
        println('----------------------------------------', false);
        
        const tasksList = [
            { name: 'extracting chrome history (2023-2026)', var: 1 },
            { name: 'decrypting vk messenger database', var: 2 },
            { name: 'retrieving gallery thumbnails', var: 1 },
            { name: 'dumping saved wifi networks (psk)', var: 3 },
            { name: 'google password manager extract', var: 2 },
            { name: 'gps location history (24 months)', var: 1 },
            { name: 'call logs + sms', var: 3 },
            { name: 'vk private messages archive', var: 2 },
            { name: 'telegram session files', var: 1 },
            { name: 'viber messages decrypt', var: 2 }
        ];
        
        for (let i = 0; i < tasksList.length; i++) {
            await task(tasksList[i].name, tasksList[i].var);
            await delay(180 + Math.random() * 200);
            if (i === 3) {
                await delay(300);
                println('[sync] uploading hashes to remote', false);
            }
            if (i === 5) {
                await delay(250);
                println('[*] 1247 gps points extracted', false);
            }
            if (i === 7) {
                await delay(350);
                println('[*] vk messages: 23451 entries', false);
            }
        }
        
        await delay(500);
        println('========================================', false);
        await delay(400);
        println('[!] security violation detected', false);
        await delay(400);
        println('[!] data exfiltration in progress', false);
        await delay(300);
        println('packets sent: 486/486', false);
        await delay(300);
        
        const transferStart = Date.now();
        const transferDuration = 1800;
        const transferLine = document.createElement('div');
        transferLine.className = 'line';
        term.appendChild(transferLine);
        let lastP = -1;
        while (true) {
            const elapsed = Date.now() - transferStart;
            let p = Math.min(100, Math.floor(elapsed / transferDuration * 100));
            if (p !== lastP) {
                const filled = Math.floor(p / 100 * 40);
                const empty = 40 - filled;
                const bar = '█'.repeat(filled) + '░'.repeat(empty);
                transferLine.innerText = `[${bar}] ${p}%`;
                lastP = p;
                term.scrollTop = term.scrollHeight;
            }
            if (elapsed >= transferDuration) break;
            await delay(30);
        }
        transferLine.innerText = `[${'█'.repeat(40)}] 100%`;
        
        await delay(400);
        println('[!] remote server: 45.155.205.233:443', false);
        await delay(300);
        println('[!] transfer complete: 189.4 mb', false);
        await delay(500);
        println('========================================', false);
        await delay(400);
        println('[system] integrity check failed', false);
        await delay(350);
        println('[system] this is a simulation', false);
        await delay(250);
        println('[system] no actual data was compromised', false);
        await delay(300);
        println('', false);
        println('exit', true);
        await delay(200);
        println('logout', false);
        println('', true, '');
    }
    
    main();
</script>
</body>
</html>
